# Job one-shot: esegue un comando webrobot CLI usando l'immagine Docker Hub.
#
# Uso:
#   kubectl create -f k8s/cli-job.yaml
#   kubectl wait -n webrobot --for=condition=complete job/webrobot-cli --timeout=300s
#   kubectl logs -n webrobot job/webrobot-cli
#
# Override comando: modifica args[] oppure usa kubectl create job con --
#   kubectl create job webrobot-cli-run --image=webrobot/webrobot-cli:latest -n webrobot -- webrobot project list
#
apiVersion: batch/v1
kind: Job
metadata:
  name: webrobot-cli
  namespace: webrobot
  labels:
    app.kubernetes.io/name: webrobot-cli
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webrobot-cli
    spec:
      restartPolicy: Never
      containers:
        - name: cli
          image: webrobot2022/webrobot-cli:latest
          imagePullPolicy: Always
          args: ["--help"]
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
              ephemeral-storage: "500Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
              ephemeral-storage: "2Gi"
          env:
            - name: WEBROBOT_API_ENDPOINT
              value: "https://api.webrobot.eu"
            # Monta config.cfg da Secret opzionale (crea con: kubectl create secret generic webrobot-cli-config --from-file=config.cfg)
          volumeMounts:
            - name: cli-config
              mountPath: /workspace/.webrobot
              readOnly: true
      volumes:
        - name: cli-config
          secret:
            secretName: webrobot-cli-config
            optional: true
